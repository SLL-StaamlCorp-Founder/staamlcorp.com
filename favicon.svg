<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Staaml Corp">
  <title>Staaml Corp</title>
  <!-- Rounded square background (brand navy) -->
  <rect width="256" height="256" rx="40" ry="40" fill="#0F1D3D"/>

  <!-- Letter S: angular geometric (three bars + two connecting verticals) -->
  <g fill="#FFFFFF" shape-rendering="geometricPrecision">
    <rect x="44"  y="72"  width="72" height="24"/>
    <rect x="44"  y="72"  width="24" height="52"/>
    <rect x="44"  y="116" width="72" height="24"/>
    <rect x="92"  y="116" width="24" height="52"/>
    <rect x="44"  y="164" width="72" height="24"/>
  </g>

  <!-- Letter A: left leg white, right leg blue, white crossbar -->
  <polygon points="178,60 162,188 130,188" fill="#FFFFFF"/>
  <polygon points="178,60 226,188 194,188" fill="#1E4FB2"/>
  <rect x="158" y="140" width="40" height="14" fill="#FFFFFF"/>
</svg>
