<svg xmlns="http://www.w3.org/2000/svg" viewBox="160 30 300 300" width="300" height="300">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0A1F44"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="160" y="30" width="300" height="300" fill="#FAFAF7"/>

  <!-- The mark: two offset rounded blocks (S form with temporal-gap negative space) -->
  <g transform="translate(230, 80)">
    <!-- Upper block -->
    <path d="M 20,0
             L 140,0
             Q 140,0 140,20
             L 140,70
             Q 140,90 120,90
             L 20,90
             Q 0,90 0,70
             L 0,20
             Q 0,0 20,0 Z"
          fill="url(#markGrad)"/>

    <!-- Lower block, offset right -->
    <path d="M 20,110
             L 120,110
             Q 140,110 140,130
             L 140,180
             Q 140,200 120,200
             L 0,200
             Q 0,200 0,180
             L 0,130
             Q 0,110 20,110 Z"
          transform="translate(20, 0)"
          fill="url(#markGrad)"/>
  </g>
</svg>
