<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0A1F44"/>
    </linearGradient>
  </defs>

  <!-- Background (remove for transparent use) -->
  <rect width="600" height="360" fill="#FAFAF7"/>

  <!-- The mark: a single continuous form -->
  <!-- Concept: an "S" rendered as two offset rounded rectangles -->
  <!-- The negative space between them encodes a temporal gap (TSD reference) -->
  <g transform="translate(230, 80)">
    <!-- Upper block -->
    <path d="M 20,0
             L 140,0
             Q 140,0 140,20
             L 140,70
             Q 140,90 120,90
             L 20,90
             Q 0,90 0,70
             L 0,20
             Q 0,0 20,0 Z"
          fill="url(#markGrad)"/>

    <!-- Lower block, offset right -->
    <path d="M 20,110
             L 120,110
             Q 140,110 140,130
             L 140,180
             Q 140,200 120,200
             L 0,200
             Q 0,200 0,180
             L 0,130
             Q 0,110 20,110 Z"
          transform="translate(20, 0)"
          fill="url(#markGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="310"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="400"
        fill="#0A1F44"
        text-anchor="middle"
        letter-spacing="14">STAAML</text>

  <!-- Sub-wordmark -->
  <text x="300" y="340"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14"
        font-weight="400"
        fill="#1B3A6B"
        text-anchor="middle"
        letter-spacing="8">CORP</text>
</svg>
